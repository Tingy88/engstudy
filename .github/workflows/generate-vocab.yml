name: Generate Vocabulary

on:
  schedule:
    - cron: '0 2,15,17,19,21 * * *'
    # 09:00 (กลางวัน เก็บไว้เทียบ), 22:00, 00:00, 02:00, 04:00 (กระจายทั่วช่วงคนจีนน่าจะหลับ)
  workflow_dispatch:        # ปุ่มกดรันเองได้ด้วย ไม่ต้องรอตารางเวลา

permissions:
  contents: write            # อนุญาตให้ script commit/push กลับเข้า repo ได้

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run vocabulary generator
        env:
          GROQ_KEY: ${{ secrets.GROQ_KEY }}
          ZAI_KEY: ${{ secrets.ZAI_KEY }}
        run: node scripts/generate-vocab.js

      - name: Commit and push if changed
        run: |
          git config user.name "vocab-bot"
          git config user.email "actions@github.com"
          git add data.js
          git diff --staged --quiet || git commit -m "Auto-add vocabulary batch"
          git push
